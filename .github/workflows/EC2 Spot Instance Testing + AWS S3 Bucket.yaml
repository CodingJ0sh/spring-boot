name: EC2 Spot Instance Testing + AWS S3 Bucket

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: [self-hosted, spot]

    steps:
      # --- Basis-Setup: Code auschecken und Java einrichten ---
      - uses: actions/checkout@v3

      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      # --- Debug-Schritte (optional) ---
      - name: Check user in workflow
        run: id
        
      - name: Docker Info
        run: docker info

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      # ========================================================
      # =============== Subprojekt 1: spring-boot-actuator =====
      # ========================================================
      - name: Build & Test Actuator
        run: |
          ./gradlew :spring-boot-project:spring-boot-actuator:clean \
                     :spring-boot-project:spring-boot-actuator:build

      - name: Upload Actuator Test Results to S3
        run: |
          # Testresultate hochladen, "actuator"
          aws s3 cp spring-boot-project/spring-boot-actuator/build/test-results/test \
            s3://my-ec2-spot-log-bucket/actuator/ --recursive

      # ========================================================
      # =============== Subprojekt 2: actuator-autoconfigure ===
      # ========================================================
      - name: Build & Test Actuator-Autoconfigure
        run: |
          ./gradlew :spring-boot-project:spring-boot-actuator-autoconfigure:clean \
                     :spring-boot-project:spring-boot-actuator-autoconfigure:build

      - name: Upload Actuator-Autoconfigure Test Results to S3
        run: |
          aws s3 cp spring-boot-project/spring-boot-actuator-autoconfigure/build/test-results/test \
            s3://my-ec2-spot-log-bucket/actuator-autoconfigure/ --recursive

      # ========================================================
      # =============== Subprojekt 3: spring-boot-autoconfigure =
      # ========================================================
      - name: Build & Test Autoconfigure
        run: |
          ./gradlew :spring-boot-project:spring-boot-autoconfigure:clean \
                     :spring-boot-project:spring-boot-autoconfigure:build

      - name: Upload Autoconfigure Test Results
        run: |
          aws s3 cp spring-boot-project/spring-boot-autoconfigure/build/test-results/test \
            s3://my-ec2-spot-log-bucket/autoconfigure/ --recursive
