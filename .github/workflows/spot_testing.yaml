name: Spot Testing

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: [self-hosted, spot]
    steps:
      - uses: actions/checkout@v2
      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build & Test
        run: |
          ./mvnw clean test -pl spring-boot-project/spring-boot-actuator -am
